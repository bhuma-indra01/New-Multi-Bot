services:
  - type: web
    name: discord-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.20.0"
      - key: DISCORD_TOKEN
        sync: false
      - key: MONGO_TOKEN
        sync: false
      - key: DISCORD_ID
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GIPHY_TOKEN
        sync: false
      - key: GROQ
        sync: false
      - key: WEBHOOK_ID
        sync: false
      - key: WEBHOOK_TOKEN
        sync: false
      - key: DISCORD_STATUS
        value: "❓┆/help, 💻┆My Server, 🎉┆400+ commands"
      - key: LAVALINK_HOST
        sync: false
      - key: LAVALINK_PORT
        value: "2333"
      - key: LAVALINK_PASSWORD
        sync: false
      - key: LAVALINK_SECURE
        value: "false"
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
